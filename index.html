<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleitorado PE 2026 - Jamildo.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --azul-jamildo: #024796;
            --laranja-jamildo: #f83d03;
            --azul-dark: #012d61;
            --bg-light: #f8fafc;
        }

        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container 600x600 */
        .widget-card {
            width: 600px;
            height: 600px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header */
        .widget-header {
            background: linear-gradient(135deg, var(--azul-jamildo) 0%, var(--azul-dark) 100%);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(2, 71, 150, 0.2);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            height: 22px;
            width: auto;
            object-fit: contain;
        }

        .header-title-group h1 {
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.1;
        }

        .header-title-group span {
            color: #93c5fd;
            font-size: 10px;
            font-weight: 500;
        }

        /* Topo: Carrossel de Cards */
        .region-carousel-section {
            background: #f1f5f9;
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .carousel-title {
            font-size: 9px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .region-cards-container {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .region-cards-container::-webkit-scrollbar {
            height: 3px;
        }
        .region-cards-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .mini-region-card {
            min-width: 120px;
            max-width: 120px;
            background: #ffffff;
            border-radius: 8px;
            padding: 6px 8px;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mini-region-card:hover, .mini-region-card.active {
            border-color: var(--azul-jamildo);
            box-shadow: 0 2px 8px rgba(2, 71, 150, 0.12);
        }

        .mini-region-card.active {
            background: #eff6ff;
            border-width: 1.5px;
        }

        .mini-card-name {
            font-size: 10px;
            font-weight: 800;
            color: var(--azul-jamildo);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-card-voters {
            font-size: 11px;
            font-weight: 800;
            color: var(--laranja-jamildo);
            margin: 1px 0;
        }

        .mini-card-sub {
            font-size: 8.5px;
            font-weight: 600;
            color: #64748b;
        }

        /* Bloco Explicativo de Geopolítica (Painel de Detalhes) */
        .geo-explanation-panel {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 8px 14px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .geo-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .geo-panel-title {
            font-size: 11px;
            font-weight: 800;
            color: var(--azul-jamildo);
        }

        .geo-panel-badge {
            background: #fff3f0;
            color: var(--laranja-jamildo);
            border: 1px solid #ffd4c7;
            font-size: 9px;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 4px;
        }

        .geo-panel-text {
            font-size: 10.5px;
            color: #334155;
            line-height: 1.35;
            font-weight: 500;
        }

        .geo-panel-text b {
            color: var(--azul-jamildo);
            font-weight: 800;
        }

        .geo-panel-text .orange-txt {
            color: var(--laranja-jamildo);
            font-weight: 800;
        }

        /* Barra de Comparação Visual */
        .geo-metrics-bar {
            display: flex;
            gap: 12px;
            margin-top: 2px;
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #f1f5f9;
        }

        .geo-metric-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .geo-metric-label {
            font-size: 8.5px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        .geo-metric-progress {
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .geo-metric-fill {
            height: 100%;
            background: var(--azul-jamildo);
            border-radius: 4px;
        }

        .geo-metric-fill.orange {
            background: var(--laranja-jamildo);
        }

        /* Controles */
        .controls-bar {
            padding: 6px 14px;
            background: #ffffff;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
            flex: 1.2;
        }

        .search-box input {
            width: 100%;
            padding: 5px 8px 5px 26px;
            font-size: 11px;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            background: #f8fafc;
        }

        .search-box input:focus {
            border-color: var(--azul-jamildo);
            background: #ffffff;
        }

        .search-icon {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 11px;
            height: 11px;
            fill: #94a3b8;
        }

        .select-custom {
            flex: 1;
            padding: 5px 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--azul-jamildo);
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            background: #f8fafc;
            outline: none;
            cursor: pointer;
        }

        /* Lista principal com scroll */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 6px 14px;
            background: #f8fafc;
        }

        .content-area::-webkit-scrollbar {
            width: 5px;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Item da Cidade */
        .city-item {
            background: #ffffff;
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 5px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .city-main-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .rank-tag {
            font-size: 8.5px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 4px;
            background: #e2e8f0;
            color: #475569;
            margin-right: 5px;
        }

        .city-item:nth-child(1) .rank-tag { background: linear-gradient(135deg, #ffd700, #ffa500); color: #7a4300; }
        .city-item:nth-child(2) .rank-tag { background: linear-gradient(135deg, #e0e0e0, #b0b0b0); color: #333333; }
        .city-item:nth-child(3) .rank-tag { background: linear-gradient(135deg, #f4a460, #cd7f32); color: #4a2500; }

        .city-name-txt {
            font-size: 12px;
            font-weight: 800;
            color: #0f172a;
        }

        .region-badge {
            font-size: 8.5px;
            font-weight: 700;
            color: var(--azul-jamildo);
            background: #eff6ff;
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 5px;
            border: 1px solid #dbeafe;
        }

        .voters-count {
            font-size: 12px;
            font-weight: 800;
            color: var(--laranja-jamildo);
        }

        .progress-track {
            height: 3px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--azul-jamildo), var(--laranja-jamildo));
            border-radius: 10px;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            font-size: 8.5px;
            color: #64748b;
            font-weight: 600;
        }

        .pill-data {
            background: #f1f5f9;
            padding: 1px 5px;
            border-radius: 3px;
        }
        .pill-data b { color: #1e293b; }

        /* Rodapé */
        .widget-footer {
            padding: 5px 14px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 8.5px;
            color: #94a3b8;
            font-weight: 600;
            flex-shrink: 0;
        }

        .footer-brand-text {
            color: var(--azul-jamildo);
            font-weight: 800;
        }

        .state-box {
            text-align: center;
            padding: 30px 20px;
            color: #64748b;
        }

        .pulse-loader {
            width: 26px;
            height: 26px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid var(--laranja-jamildo);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="widget-card">
        <!-- Header -->
        <div class="widget-header">
            <div class="header-brand">
                <img src="https://jamildo.com/media/uploads/brancologojamildo_6xe6mA0.png" alt="Jamildo.com" class="brand-logo" onerror="this.src='https://jamildo.com/media/uploads/logojamildo.png'">
                <div class="header-title-group">
                    <h1>Eleitorado PE 2026</h1>
                    <span>Geopolítica dos Maiores Colégios</span>
                </div>
            </div>
            <span style="background: rgba(248,61,3,0.2); color: #ff7d56; font-size: 8.5px; font-weight: 800; padding: 2px 7px; border-radius: 8px; border: 1px solid var(--laranja-jamildo);">TSE Oficial</span>
        </div>

        <!-- Seção de Cards no Topo -->
        <div class="region-carousel-section">
            <div class="carousel-title">
                Selecione para analisar a região
                <span>Clique no card ↓</span>
            </div>
            <div class="region-cards-container" id="regionCardsList">
                <!-- Cards via JS -->
            </div>
        </div>

        <!-- Bloco Explicativo de Geopolítica (Painel Dinâmico) -->
        <div class="geo-explanation-panel" id="geoExplanationPanel">
            <!-- Conteúdo dinâmico via JS -->
        </div>

        <!-- Controles -->
        <div class="controls-bar">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Pesquisar município..." oninput="handleFilters()">
            </div>
            <select id="regionSelect" class="select-custom" onchange="handleDropdownFilter()">
                <option value="">Todas as Regiões</option>
            </select>
        </div>

        <!-- Lista Principal com Scroll -->
        <div class="content-area" id="contentList">
            <div class="state-box">
                <div class="pulse-loader"></div>
                <p style="font-size: 11px; font-weight: 600;">Carregando dados eleitorais...</p>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="widget-footer">
            <span>Dados Atualizados 2026</span>
            <span>Painel Geopolítico • <span class="footer-brand-text">jamildo.com</span></span>
        </div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRl-WL06jIHVklMveo3EQmUd9FVj6lq7yhAwnuzyHDJ_U8GQpNPi5oOkkdG-gZac4lQig3pV1a-YR7L/pub?gid=936683729&single=true&output=csv";

        let rawData = [];
        let filteredData = [];
        let regionsData = [];
        let maxVoters = 1;
        let totalStateVoters = 0;
        let selectedRegionFilter = "";

        function cleanNumber(val) {
            if (!val) return 0;
            return parseInt(String(val).replace(/\D/g, ''), 10) || 0;
        }

        function formatNum(num) {
            return num.toLocaleString('pt-BR');
        }

        function initData() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processRows(results.data);
                },
                error: function() {
                    showError();
                }
            });
        }

        function processRows(rows) {
            rawData = rows.map(row => {
                const keys = Object.keys(row);
                const cityKey = keys.find(k => k.toLowerCase().includes('munic')) || keys[0];
                const totalKey = keys.find(k => k.toLowerCase().includes('eleitor')) || keys[1];
                const facKey = keys.find(k => k.toLowerCase().includes('facultativ')) || keys[2];
                const obrigKey = keys.find(k => k.toLowerCase().includes('obrigat')) || keys[3];
                const regKey = keys.find(k => k.toLowerCase().includes('regi')) || keys[4];

                let cityName = row[cityKey] ? String(row[cityKey]).trim() : '';
                let regName = row[regKey] ? String(row[regKey]).trim() : 'Geral';

                if (cityName.toUpperCase().includes('NORONHA') && (!regName || regName === 'Geral')) {
                    regName = 'RMR';
                }

                return {
                    name: cityName,
                    total: cleanNumber(row[totalKey]),
                    fac: cleanNumber(row[facKey]),
                    obrig: cleanNumber(row[obrigKey]),
                    region: regName
                };
            }).filter(item => item.name !== '' && item.total > 0);

            if (!rawData.length) {
                showError();
                return;
            }

            rawData.sort((a, b) => b.total - a.total);
            rawData.forEach((item, idx) => item.rank = idx + 1);
            maxVoters = rawData[0].total;
            totalStateVoters = rawData.reduce((acc, curr) => acc + curr.total, 0);

            // Agrupar Regiões
            const regMap = {};
            rawData.forEach(item => {
                if (!regMap[item.region]) {
                    regMap[item.region] = { name: item.region, total: 0, citiesCount: 0, top30Count: 0 };
                }
                regMap[item.region].total += item.total;
                regMap[item.region].citiesCount += 1;
                if (item.rank <= 30) {
                    regMap[item.region].top30Count += 1;
                }
            });

            regionsData = Object.values(regMap).sort((a, b) => b.total - a.total);

            // Renderizar mini cards topo
            renderRegionCards();

            // Popular select
            const regSelect = document.getElementById('regionSelect');
            regionsData.forEach(reg => {
                const opt = document.createElement('option');
                opt.value = reg.name;
                opt.textContent = reg.name;
                regSelect.appendChild(opt);
            });

            // Atualizar explicação geopolítica inicial
            updateGeoPanel('');

            filteredData = [...rawData];
            renderList();
        }

        function renderRegionCards() {
            const container = document.getElementById('regionCardsList');
            let html = `
                <div class="mini-region-card active" id="card-all" onclick="selectRegionCard('')">
                    <div class="mini-card-name">Pernambuco (Geral)</div>
                    <div class="mini-card-voters">${formatNum(totalStateVoters)}</div>
                    <div class="mini-card-sub"><b>184</b> municípios + Noronha</div>
                </div>
            `;

            regionsData.forEach(reg => {
                html += `
                    <div class="mini-region-card" id="card-${reg.name.replace(/\s+/g, '-')}" onclick="selectRegionCard('${reg.name}')">
                        <div class="mini-card-name" title="${reg.name}">${reg.name}</div>
                        <div class="mini-card-voters">${formatNum(reg.total)}</div>
                        <div class="mini-card-sub">Top30: <b>${reg.top30Count} cidades</b></div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateGeoPanel(regionName) {
            const panel = document.getElementById('geoExplanationPanel');

            if (regionName === '') {
                panel.innerHTML = `
                    <div class="geo-panel-header">
                        <span class="geo-panel-title">Panorama Geral do Estado</span>
                        <span class="geo-panel-badge">100% Cobertura</span>
                    </div>
                    <div class="geo-panel-text">
                        Pernambuco conta com <b>${formatNum(totalStateVoters)} eleitores aptos</b> distribuídos em <b>184 municípios + Fernando de Noronha</b>. Os <b>30 maiores colégios eleitorais</b> concentram a maior fatia de votos para as Eleições 2026.
                    </div>
                `;
                return;
            }

            const regInfo = regionsData.find(r => r.name === regionName);
            if (!regInfo) return;

            const percentState = ((regInfo.total / totalStateVoters) * 100).toFixed(1);
            const top30Percent = ((regInfo.top30Count / 30) * 100).toFixed(1);
            const citiesPercent = ((regInfo.citiesCount / 184) * 100).toFixed(1);

            panel.innerHTML = `
                <div class="geo-panel-header">
                    <span class="geo-panel-title">Análise Geopolítica: ${regInfo.name}</span>
                    <span class="geo-panel-badge">${percentState}% do Eleitorado de PE</span>
                </div>
                <div class="geo-panel-text">
                    O <b>${regInfo.name}</b> possui <span class="orange-txt">${formatNum(regInfo.total)} eleitores</span>. Dos <b>30 maiores colégios eleitorais</b> do estado, <span class="orange-txt">${regInfo.top30Count} cidades</span> pertencem a esta região, que soma <b>${regInfo.citiesCount} municípios</b> no total.
                </div>
                <div class="geo-metrics-bar">
                    <div class="geo-metric-item">
                        <span class="geo-metric-label">Presença no Top 30: <b>${regInfo.top30Count} de 30 (${top30Percent}%)</b></span>
                        <div class="geo-metric-progress">
                            <div class="geo-metric-fill orange" style="width: ${top30Percent}%;"></div>
                        </div>
                    </div>
                    <div class="geo-metric-item">
                        <span class="geo-metric-label">Peso Territorial: <b>${regInfo.citiesCount} de 184 cidades + Noronha (${citiesPercent}%)</b></span>
                        <div class="geo-metric-progress">
                            <div class="geo-metric-fill" style="width: ${citiesPercent}%;"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectRegionCard(regionName) {
            selectedRegionFilter = regionName;
            document.getElementById('regionSelect').value = regionName;
            
            document.querySelectorAll('.mini-region-card').forEach(card => card.classList.remove('active'));
            if (regionName === '') {
                document.getElementById('card-all').classList.add('active');
            } else {
                const targetCard = document.getElementById(`card-${regionName.replace(/\s+/g, '-')}`);
                if (targetCard) targetCard.classList.add('active');
            }

            updateGeoPanel(regionName);
            handleFilters();
        }

        function handleDropdownFilter() {
            const val = document.getElementById('regionSelect').value;
            selectRegionCard(val);
        }

        function handleFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            filteredData = rawData.filter(item => {
                const nameNorm = item.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const matchName = nameNorm.includes(query);
                const matchRegion = selectedRegionFilter === "" || item.region === selectedRegionFilter;
                return matchName && matchRegion;
            });

            renderList();
        }

        function renderList() {
            const listContainer = document.getElementById('contentList');

            if (!filteredData.length) {
                listContainer.innerHTML = '<div class="state-box"><p style="font-size: 12px; font-weight: 700;">Nenhum município encontrado para esse filtro.</p></div>';
                return;
            }

            let html = '';
            filteredData.forEach(item => {
                const barWidth = Math.max(4, Math.round((item.total / maxVoters) * 100));
                html += `
                    <div class="city-item">
                        <div class="city-main-info">
                            <div>
                                <span class="rank-tag">#${item.rank}</span>
                                <span class="city-name-txt">${item.name}</span>
                                <span class="region-badge">${item.region}</span>
                            </div>
                            <div class="voters-count">${formatNum(item.total)}</div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${barWidth}%;"></div>
                        </div>
                        <div class="breakdown-row">
                            <span class="pill-data">Obrigatório: <b>${formatNum(item.obrig)}</b></span>
                            <span class="pill-data">Facultativo: <b>${formatNum(item.fac)}</b></span>
                        </div>
                    </div>
                `;
            });

            listContainer.innerHTML = html;
        }

        function showError() {
            document.getElementById('contentList').innerHTML = '<div class="state-box"><p style="color: #ef4444; font-weight: 700;">Erro ao carregar dados da planilha.</p></div>';
        }

        window.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
